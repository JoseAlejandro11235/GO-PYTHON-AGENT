<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cursorlite</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/codemirror.min.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/theme/dracula.min.css" />
  <link rel="stylesheet" href="/style.css" />
</head>
<body>
  <header class="top">
    <span class="logo">Cursorlite</span>
    <span id="status" class="status"></span>
    <button type="button" id="saveBtn" class="btn primary">Save</button>
  </header>
  <div class="layout">
    <aside class="sidebar">
      <div class="panel-title">Explorer</div>
      <div id="tree" class="tree"></div>
    </aside>
    <main class="editor-wrap">
      <div class="tabs">
        <span id="openFile" class="tab">No file</span>
      </div>
      <textarea id="editorFallback" hidden></textarea>
    </main>
    <aside class="chat">
      <div class="panel-title">Chat</div>
      <div id="chatLog" class="chat-log"></div>
      <form id="chatForm" class="chat-form">
        <textarea id="chatInput" rows="3" placeholder="Ask about your code…"></textarea>
        <button type="submit" class="btn">Send</button>
      </form>
    </aside>
  </div>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/codemirror.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/mode/javascript/javascript.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/mode/go/go.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/mode/python/python.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/mode/xml/xml.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/mode/htmlmixed/htmlmixed.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/mode/css/css.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/mode/markdown/markdown.min.js"></script>
  <script src="/app.js" type="module"></script>
</body>
</html>
